<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Leçon — Luckily Academy</title>

<style>
body{padding-top:58px;}
.ltb{position:fixed;top:0;left:0;right:0;z-index:1000;height:58px;background:var(--bg-card);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;padding:0 18px;gap:12px;}
.ltb-logo{font-family:var(--ff-d);font-size:.95rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex-shrink:0;text-decoration:none;}
.ltb-logo em{font-style:italic;color:var(--primary);}
.ltb-title{flex:1;font-size:.82rem;color:var(--text-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ltb-prog{min-width:130px;flex-shrink:0;}
.ltb-pb{height:4px;background:var(--bg-alt);border-radius:2px;}
.ltb-pf{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width 1s ease;}
.ltb-pt{font-size:.67rem;color:var(--text-m);margin-top:3px;text-align:right;}
.lesson-wrap{max-width:1280px;margin:0 auto;padding:36px 24px;display:grid;grid-template-columns:1fr 300px;gap:36px;}

/* LESSON CONTENT — proper rendering */
.lesson-content{color:var(--text);}
.lesson-content h1{font-family:var(--ff-d);font-size:1.9rem;font-weight:700;margin:0 0 20px;}
.lesson-content h2{font-family:var(--ff-d);font-size:1.4rem;font-weight:700;margin:28px 0 12px;color:var(--text);}
.lesson-content h3{font-family:var(--ff-d);font-size:1.15rem;font-weight:700;margin:22px 0 10px;color:var(--text);}
.lesson-content p{font-size:.95rem;color:var(--text-m);line-height:1.85;margin-bottom:14px;}
.lesson-content strong{color:var(--text);font-weight:700;}
.lesson-content em{font-style:italic;color:var(--text);}
.lesson-content ul,.lesson-content ol{padding-left:22px;margin-bottom:14px;}
.lesson-content ul li,.lesson-content ol li{font-size:.93rem;color:var(--text-m);line-height:1.8;margin-bottom:5px;}
.lesson-content ul li{list-style:disc;}
.lesson-content ol li{list-style:decimal;}
.lesson-content code{font-family:'Courier New',monospace;background:var(--bg-alt);padding:2px 6px;border-radius:4px;font-size:.83rem;color:var(--primary);}
.lesson-content pre{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;overflow-x:auto;margin:16px 0;}
.lesson-content pre code{background:none;padding:0;color:var(--text);font-size:.82rem;line-height:1.6;display:block;}
.lesson-content img{max-width:100%;border-radius:var(--r-lg);margin:20px 0;box-shadow:var(--sh);}
.lesson-content blockquote{border-left:4px solid var(--primary);background:rgba(0,180,216,.06);padding:12px 18px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin:16px 0;}
.lesson-content blockquote p{margin-bottom:0;font-style:italic;}
.lesson-content hr{border:none;border-top:1px solid var(--border);margin:24px 0;}
.lesson-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem;}
.lesson-content table th{background:var(--bg-alt);font-weight:700;padding:10px 14px;border:1px solid var(--border);text-align:left;}
.lesson-content table td{padding:9px 14px;border:1px solid var(--border);color:var(--text-m);}
.lesson-content table tr:nth-child(even) td{background:var(--bg-alt);}

.tip-box{background:rgba(0,180,216,.07);border-left:4px solid var(--primary);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:14px 18px;margin:20px 0;}
.tip-box strong{color:var(--primary);display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}

.ai-q-btn{padding:7px 14px;border-radius:50px;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.2);color:var(--primary);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--ff-b);}
.ai-q-btn:hover{background:var(--primary);color:#fff;}

.ls-panel{position:sticky;top:calc(58px + 20px);height:fit-content;max-height:calc(100vh - 80px);overflow-y:auto;}
.ls-ch{padding:9px 14px;background:var(--bg-alt);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-m);border-bottom:1px solid var(--border);}
.ls-list{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.ls-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:.81rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .18s;color:var(--text-m);}
.ls-item:last-child{border-bottom:none;}
.ls-item:hover{background:var(--bg-alt);}
.ls-item.active{background:var(--primary-l);color:var(--primary);font-weight:700;}
.ls-item.done{color:#06D6A0;}

.spinner-lg{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:80px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.lesson-wrap{grid-template-columns:1fr;}.ls-panel{position:static;max-height:none;}}
@media(max-width:600px){.ltb-prog{display:none;}.ltb-title{font-size:.74rem;}}
</style>

<script>
// ═══════════════════════════════════════════════════════════
// LUCKILY ACADEMY — api.js
// Client API centralisé pour communiquer avec le backend
// Ce fichier est inclus dans toutes les pages HTML
// ═══════════════════════════════════════════════════════════
// ── URL du backend (à remplacer après déploiement Render) ──
// Backend Luckily Academy — Render
const API_BASE = window.LA_API_BASE || 'https://back-end-formation-luckily-academy-1.onrender.com';

// ── Clés localStorage ──
const K = {
  TOKEN:    'la_token',
  USER:     'la_user',
  THEME:    'la_t',
  LANG:     'la_l',
  PROGRESS: 'la_progress_cache'
};

// ──────────────────────────────────────────────────────────
// HELPERS HTTP
// ──────────────────────────────────────────────────────────
async function apiRequest(method, endpoint, body = null, requireAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  const token = localStorage.getItem(K.TOKEN);

  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (requireAuth && !token) {
    throw new Error('AUTH_REQUIRED');
  }

  const opts = { method, headers };
  if (body && (method === 'POST' || method === 'PUT')) {
    opts.body = JSON.stringify(body);
  }

  try {
    const res = await fetch(`${API_BASE}${endpoint}`, opts);
    const data = await res.json();

    // Token expiré → déconnecter
    if (res.status === 401 && token) {
      localStorage.removeItem(K.TOKEN);
      localStorage.removeItem(K.USER);
      // Rediriger vers login si on n'y est pas déjà
      if (!window.location.pathname.includes('auth.html')) {
        window.location.href = 'auth.html?expired=1';
      }
      throw new Error('SESSION_EXPIRED');
    }

    return { ok: res.ok, status: res.status, data };
  } catch (err) {
    if (err.message === 'AUTH_REQUIRED' || err.message === 'SESSION_EXPIRED') throw err;
    // Erreur réseau
    throw new Error('NETWORK_ERROR');
  }
}

const api = {
  get:    (endpoint, auth = false)        => apiRequest('GET',    endpoint, null, auth),
  post:   (endpoint, body, auth = false)  => apiRequest('POST',   endpoint, body, auth),
  put:    (endpoint, body, auth = true)   => apiRequest('PUT',    endpoint, body, auth),
  delete: (endpoint, auth = true)         => apiRequest('DELETE', endpoint, null, auth),
};

// ──────────────────────────────────────────────────────────
// AUTHENTIFICATION
// ──────────────────────────────────────────────────────────
const Auth = {
  // Récupérer l'utilisateur depuis localStorage
  getUser() {
    try { return JSON.parse(localStorage.getItem(K.USER) || 'null'); } catch { return null; }
  },

  getToken() { return localStorage.getItem(K.TOKEN); },

  isLoggedIn() { return !!this.getToken(); },

  // Sauvegarder session
  saveSession(token, user) {
    localStorage.setItem(K.TOKEN, token);
    localStorage.setItem(K.USER, JSON.stringify(user));
  },

  // Effacer session
  clearSession() {
    localStorage.removeItem(K.TOKEN);
    localStorage.removeItem(K.USER);
    localStorage.removeItem(K.PROGRESS);
  },

  // Inscription
  async register(fullname, email, password, phone = '') {
    const res = await api.post('/api/auth/register', { fullname, email, password, phone });
    if (res.ok && res.data.token) {
      this.saveSession(res.data.token, res.data.user);
    }
    return res;
  },

  // Connexion
  async login(email, password) {
    const res = await api.post('/api/auth/login', { email, password });
    if (res.ok && res.data.token) {
      this.saveSession(res.data.token, res.data.user);
    }
    return res;
  },

  // Déconnexion
  async logout() {
    try {
      await api.post('/api/auth/logout', {}, true);
    } catch { /* ignore */ }
    this.clearSession();
    window.location.href = 'index.html';
  },

  // Profil complet depuis API
  async getMe() {
    return api.get('/api/auth/me', true);
  },

  // Modifier profil
  async updateProfile(data) {
    const res = await api.put('/api/auth/profile', data);
    if (res.ok) {
      // Mettre à jour le cache local
      const user = this.getUser();
      if (user) {
        Object.assign(user, data);
        localStorage.setItem(K.USER, JSON.stringify(user));
      }
    }
    return res;
  },

  // Changer mot de passe
  async changePassword(currentPassword, newPassword) {
    return api.put('/api/auth/change-password', { currentPassword, newPassword });
  },

  // Vérifier code formation
  async verifyCode(courseId, code) {
    return api.post('/api/auth/verify-code', { courseId, code }, true);
  },

  // Marquer leçon complétée
  async markLessonDone(courseId, lessonKey) {
    // Mettre à jour le cache local immédiatement
    const cache = this._getProgressCache();
    if (!cache[courseId]) cache[courseId] = [];
    if (!cache[courseId].includes(lessonKey)) cache[courseId].push(lessonKey);
    localStorage.setItem(K.PROGRESS, JSON.stringify(cache));
    // Sync avec le backend
    return api.post('/api/auth/progress', { courseId, lessonKey }, true).catch(() => {});
  },

  // Progression locale (cache)
  _getProgressCache() {
    try { return JSON.parse(localStorage.getItem(K.PROGRESS) || '{}'); } catch { return {}; }
  },

  getLessonProgress(courseId) {
    return this._getProgressCache()[courseId] || [];
  },

  getProgressPct(courseId, total) {
    if (!total) return 0;
    return Math.round((this.getLessonProgress(courseId).length / total) * 100);
  },

  // Vérifier si inscrit (depuis cache user)
  isEnrolled(courseId) {
    const user = this.getUser();
    return user?.enrollments?.includes(courseId) || false;
  },

  // Ajouter enrollment au cache local
  addEnrollment(courseId) {
    const user = this.getUser();
    if (user) {
      if (!user.enrollments) user.enrollments = [];
      if (!user.enrollments.includes(courseId)) user.enrollments.push(courseId);
      localStorage.setItem(K.USER, JSON.stringify(user));
    }
  },

  // Supprimer compte
  async deleteAccount() {
    const res = await api.delete('/api/auth/account');
    if (res.ok) this.clearSession();
    return res;
  }
};

// ──────────────────────────────────────────────────────────
// FORMATIONS
// ──────────────────────────────────────────────────────────
const Courses = {
  // Cache simple
  _cache: {},

  async list() {
    if (this._cache.list) return { ok: true, data: { courses: this._cache.list } };
    const res = await api.get('/api/courses');
    if (res.ok) this._cache.list = res.data.courses;
    return res;
  },

  async get(id) {
    if (this._cache[id]) return { ok: true, data: { course: this._cache[id] } };
    const res = await api.get(`/api/courses/${id}`);
    if (res.ok) this._cache[id] = res.data.course;
    return res;
  },

  async getLesson(courseId, lessonId) {
    return api.get(`/api/courses/${courseId}/lesson/${lessonId}`, true);
  },

  async getPdfUrl(courseId) {
    return api.get(`/api/courses/${courseId}/pdf`, true);
  },

  clearCache() { this._cache = {}; }
};

// ──────────────────────────────────────────────────────────
// INTELLIGENCE ARTIFICIELLE
// ──────────────────────────────────────────────────────────
const AI = {
  _busy: false,
  _history: [],

  async ask(message, options = {}) {
    if (this._busy) return null;
    this._busy = true;
    try {
      const res = await api.post('/api/claude', {
        message,
        courseId: options.courseId || null,
        lessonId: options.lessonId || null,
        history: this._history.slice(-10),
        lang: localStorage.getItem(K.LANG) || 'fr'
      });
      if (res.ok) {
        this._history.push({ role: 'user', content: message });
        this._history.push({ role: 'assistant', content: res.data.reply });
        // Limiter l'historique
        if (this._history.length > 20) this._history = this._history.slice(-20);
      }
      return res;
    } finally {
      this._busy = false;
    }
  },

  async lessonHelp(courseId, lessonId, type) {
    return api.post('/api/claude/lesson-help', { courseId, lessonId, type }, true);
  },

  clearHistory() { this._history = []; },
  isBusy() { return this._busy; }
};

// ──────────────────────────────────────────────────────────
// UI HELPERS
// ──────────────────────────────────────────────────────────

// Toast notification
function toast(msg, type = 'info') {
  document.querySelector('.la-toast')?.remove();
  const colors = { success: '#06D6A0', error: '#EF233C', info: '#00B4D8', warning: '#F77F00' };
  const t = document.createElement('div');
  t.className = 'la-toast';
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(14px);
    padding:10px 22px;border-radius:9999px;font-size:.84rem;font-weight:700;
    box-shadow:0 20px 60px rgba(0,0,0,.14);z-index:10000;opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
    pointer-events:none;color:#fff;background:${colors[type] || colors.info};
    font-family:var(--ff-b,Jost,sans-serif);`;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(14px)';
    setTimeout(() => t.remove(), 350);
  }, 3200);
}

// Thème
function initTheme() {
  const t = localStorage.getItem(K.THEME) || 'light';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeIcon(t);
}

function updateThemeIcon(t) {
  const el = document.getElementById('themeIcon');
  if (!el) return;
  el.innerHTML = t === 'dark'
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const nxt = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', nxt);
  localStorage.setItem(K.THEME, nxt);
  updateThemeIcon(nxt);
  const dt = document.getElementById('darkToggle');
  if (dt) dt.checked = nxt === 'dark';
}

// Navbar
function initNavbar() {
  const nav  = document.getElementById('navbar');
  const hbg  = document.getElementById('hamburger');
  const nls  = document.getElementById('navLinks');
  const lbtn = document.getElementById('langBtn');
  const ldrop = document.getElementById('langDrop');
  const tBtn = document.getElementById('themeBtn');

  if (nav) window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40), { passive: true });

  if (hbg && nls) {
    hbg.addEventListener('click', e => {
      e.stopPropagation();
      const o = nls.classList.toggle('open');
      hbg.classList.toggle('open', o);
    });
    nls.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nls.classList.remove('open'); hbg.classList.remove('open');
    }));
    document.addEventListener('click', e => {
      if (nav && !nav.contains(e.target)) { nls.classList.remove('open'); hbg.classList.remove('open'); }
    });
  }

  if (tBtn) tBtn.addEventListener('click', toggleTheme);

  if (lbtn && ldrop) {
    lbtn.addEventListener('click', e => { e.stopPropagation(); ldrop.classList.toggle('open'); });
    document.addEventListener('click', () => ldrop.classList.remove('open'));
  }

  // Mettre à jour l'état auth dans la navbar
  updateNavAuth();
}

function updateNavAuth() {
  const user  = Auth.getUser();
  const authBtn = document.getElementById('authBtn');
  const dashBtn = document.getElementById('dashBtn');
  const navAv   = document.getElementById('navAv');

  if (user) {
    authBtn?.classList.add('hidden');
    dashBtn?.classList.remove('hidden');
    if (navAv) navAv.textContent = (user.fullname || 'U').charAt(0).toUpperCase();
  } else {
    authBtn?.classList.remove('hidden');
    dashBtn?.classList.add('hidden');
  }
}

// Langue
function setLang(l) {
  localStorage.setItem(K.LANG, l);
  const el = document.getElementById('curLang');
  if (el) el.textContent = l.toUpperCase();
  document.getElementById('langDrop')?.classList.remove('open');
  if (typeof applyLang === 'function') applyLang();
}

// Animations scroll
function initAnims() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  const watch = () => document.querySelectorAll('.anim:not(.vis)').forEach(el => io.observe(el));
  watch();
  new MutationObserver(watch).observe(document.body, { childList: true, subtree: true });
}

// Compteurs animés
function initCounters() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !e.target.dataset.done) {
        e.target.dataset.done = '1';
        const tgt = parseInt(e.target.dataset.count, 10);
        let cur = 0;
        const step = Math.max(1, tgt / 80);
        const t = setInterval(() => {
          cur += step;
          if (cur >= tgt) { cur = tgt; clearInterval(t); }
          e.target.textContent = Math.floor(cur).toLocaleString('fr-FR');
        }, 16);
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('[data-count]').forEach(el => io.observe(el));
}

// Format prix
function fmtPrice(p) { return Number(p).toLocaleString('fr-FR') + ' FCFA'; }

// Smooth scroll
document.addEventListener('click', e => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  const h = a.getAttribute('href');
  if (!h || h === '#') return;
  const el = document.querySelector(h);
  if (el) { e.preventDefault(); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
});

// Loader
window.addEventListener('load', () => setTimeout(() => document.getElementById('loader')?.classList.add('hidden'), 1000));

// ── AI Chat UI Helper ──
function createAIChat(msgsContainerId, inputId, sendBtnSelector, courseId = null, lessonId = null) {
  async function sendMessage() {
    const input = document.getElementById(inputId);
    if (!input || !input.value.trim() || AI.isBusy()) return;
    const msg = input.value.trim();
    input.value = '';

    addChatMsg(msg, 'user', msgsContainerId);

    // Typing indicator
    const box = document.getElementById(msgsContainerId);
    const ty = document.createElement('div');
    ty.className = 'ai-msg bot';
    ty.innerHTML = '<div class="msg-bbl ai-typing"><span></span><span></span><span></span></div>';
    box?.appendChild(ty);
    if (box) box.scrollTop = box.scrollHeight;

    const res = await AI.ask(msg, { courseId, lessonId });
    ty.parentNode?.removeChild(ty);

    if (res?.ok) {
      addChatMsg(res.data.reply, 'bot', msgsContainerId);
    } else {
      addChatMsg('Désolé, une erreur est survenue. Réessayez dans un instant.', 'bot', msgsContainerId);
    }
  }

  // Bind events
  const input = document.getElementById(inputId);
  if (input) input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

  // Return send function for button binding
  return sendMessage;
}

function addChatMsg(text, type, containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const d = document.createElement('div');
  d.className = 'ai-msg ' + type;
  d.innerHTML = '<div class="msg-bbl">' + text.replace(/\n/g, '<br>') + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

// ── AI Modal Global ──
function openAI(courseId = null, lessonId = null) {
  document.getElementById('aiModal')?.classList.add('open');
  setTimeout(() => document.getElementById('aiInp')?.focus(), 300);
  // Stocker le contexte courant
  window._aiCtx = { courseId, lessonId };
}

function closeAI() { document.getElementById('aiModal')?.classList.remove('open'); }

document.addEventListener('click', e => {
  const m = document.getElementById('aiModal');
  if (m && e.target === m) closeAI();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAI(); });

// Init au chargement
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  initNavbar();
  initAnims();
  initCounters();

  // Bind envoi IA globale
  const aiSendBtn = document.getElementById('aiSendBtn');
  const aiInp = document.getElementById('aiInp');
  const sendAIGlobal = async () => {
    if (!aiInp || !aiInp.value.trim() || AI.isBusy()) return;
    const msg = aiInp.value.trim();
    aiInp.value = '';
    addChatMsg(msg, 'user', 'aiMsgs');
    const box = document.getElementById('aiMsgs');
    const ty = document.createElement('div');
    ty.className = 'ai-msg bot';
    ty.innerHTML = '<div class="msg-bbl ai-typing"><span></span><span></span><span></span></div>';
    box?.appendChild(ty);
    if (box) box.scrollTop = box.scrollHeight;
    const ctx = window._aiCtx || {};
    const res = await AI.ask(msg, ctx);
    ty.parentNode?.removeChild(ty);
    if (res?.ok) addChatMsg(res.data.reply, 'bot', 'aiMsgs');
    else addChatMsg('Erreur temporaire. Réessayez.', 'bot', 'aiMsgs');
  };
  if (aiSendBtn) aiSendBtn.onclick = sendAIGlobal;
  if (aiInp) aiInp.addEventListener('keypress', e => { if (e.key === 'Enter') sendAIGlobal(); });
});

// Exporter pour usage dans les pages
window.LA = { API_BASE, K, Auth, Courses, AI, toast, fmtPrice, openAI, closeAI, addChatMsg, createAIChat, setLang, toggleTheme };

<script>
if(!LA.Auth.isLoggedIn()){window.location.href='auth.html';}

// ── MARKDOWN → HTML CONVERTER (correct, no raw \n) ──
function mdToHTML(text) {
  if (!text) return '';
  let html = text;

  // Code blocks first (before any other processing)
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').trim();
    return `<pre><code class="lang-${lang}">${escaped}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

  // Split into lines for block processing
  const lines = html.split('\n');
  const result = [];
  let inList = false;
  let inOl = false;
  let listItems = [];

  function flushList() {
    if (listItems.length > 0) {
      if (inOl) {
        result.push('<ol>' + listItems.map(i => `<li>${i}</li>`).join('') + '</ol>');
      } else {
        result.push('<ul>' + listItems.map(i => `<li>${i}</li>`).join('') + '</ul>');
      }
      listItems = [];
      inList = false;
      inOl = false;
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (!trimmed) {
      flushList();
      result.push('');
      continue;
    }

    // Skip lines that are already HTML tags
    if (trimmed.startsWith('<pre>') || trimmed.startsWith('</pre>') ||
        trimmed.startsWith('<code>') || trimmed.startsWith('</code>')) {
      flushList();
      result.push(line);
      continue;
    }

    // Headings
    if (trimmed.startsWith('### ')) { flushList(); result.push(`<h3>${trimmed.slice(4)}</h3>`); continue; }
    if (trimmed.startsWith('## ')) { flushList(); result.push(`<h2>${trimmed.slice(3)}</h2>`); continue; }
    if (trimmed.startsWith('# ')) { flushList(); result.push(`<h2>${trimmed.slice(2)}</h2>`); continue; }

    // Horizontal rule
    if (trimmed === '---' || trimmed === '***') { flushList(); result.push('<hr>'); continue; }

    // Blockquote
    if (trimmed.startsWith('> ')) { flushList(); result.push(`<blockquote><p>${trimmed.slice(2)}</p></blockquote>`); continue; }

    // Ordered list
    const olMatch = trimmed.match(/^(\d+)\.\s+(.+)/);
    if (olMatch) {
      if (!inOl && inList) { flushList(); }
      inList = true; inOl = true;
      listItems.push(olMatch[2]);
      continue;
    }

    // Unordered list (•, -, *, ✓, ✗, ✦, ─)
    const ulMatch = trimmed.match(/^[•\-\*✓✗✦─]\s+(.+)/);
    if (ulMatch) {
      if (inOl) { flushList(); }
      inList = true; inOl = false;
      listItems.push(ulMatch[1]);
      continue;
    }

    // Normal paragraph
    flushList();
    if (trimmed) result.push(`<p>${trimmed}</p>`);
  }
  flushList();

  // Join and clean up
  let final = result.join('\n');

  // Fix: don't wrap pre blocks in p tags
  final = final.replace(/<p>(<pre>[\s\S]*?<\/pre>)<\/p>/g, '$1');
  final = final.replace(/<p>(<blockquote>[\s\S]*?<\/blockquote>)<\/p>/g, '$1');
  final = final.replace(/<p>(<h[1-6]>[\s\S]*?<\/h[1-6]>)<\/p>/g, '$1');
  final = final.replace(/<p>(<ul>[\s\S]*?<\/ul>)<\/p>/g, '$1');
  final = final.replace(/<p>(<ol>[\s\S]*?<\/ol>)<\/p>/g, '$1');
  final = final.replace(/<p><\/p>/g, '');

  return final;
}

// ── AI QUICK ACTIONS ──
let currentLessonTitle = '';
let currentCourseId = '';
let currentLessonId = '';

async function aiQuick(type) {
  openAI();
  const typeMsgs = {
    explain: 'Explique en détail le concept principal de cette leçon avec des exemples concrets adaptés au contexte africain.',
    example: 'Donne-moi 2 exemples pratiques et concrets pour cette leçon, adaptés au marché béninois/africain.',
    quiz: 'Génère un quiz de 3 questions (QCM) sur cette leçon avec les réponses correctes expliquées.',
    summary: 'Résume cette leçon en 5 points clés essentiels numérotés et clairs.'
  };

  // Use backend lesson-help route if enrolled
  try {
    LA.addChatMsg(`[${currentLessonTitle}] ${typeMsgs[type]}`, 'user', 'aiMsgs');
    const box = document.getElementById('aiMsgs');
    const ty = document.createElement('div');
    ty.className = 'ai-msg bot';
    ty.innerHTML = '<div class="msg-bbl ai-typing"><span></span><span></span><span></span></div>';
    box?.appendChild(ty); if (box) box.scrollTop = box.scrollHeight;

    const res = await LA.AI.lessonHelp(currentCourseId, currentLessonId, type);
    ty.parentNode?.removeChild(ty);
    if (res?.ok) {
      LA.addChatMsg(res.data.reply, 'bot', 'aiMsgs');
    } else {
      // Fallback to general AI
      const fallbackRes = await LA.AI.ask(`[Leçon: "${currentLessonTitle}"] ${typeMsgs[type]}`, { courseId: currentCourseId, lessonId: currentLessonId });
      if (fallbackRes?.ok) LA.addChatMsg(fallbackRes.data.reply, 'bot', 'aiMsgs');
      else LA.addChatMsg('Erreur temporaire. Réessayez.', 'bot', 'aiMsgs');
    }
  } catch(e) {
    LA.addChatMsg('Erreur de connexion. Vérifiez votre connexion internet.', 'bot', 'aiMsgs');
  }
}

// ── LESSON DATA (cached from API) ──
let courseData = null;

function getAllLessons(content) {
  const all = [];
  if (!content?.chapters) return all;
  content.chapters.forEach((ch, ci) => {
    (ch.lessons || []).forEach((l, li) => all.push({ ch: ci, les: li, chTitle: ch.title, lesTitle: l.title, lesId: l.id }));
  });
  return all;
}

function renderSidebar(content, cid, curCh, curLes) {
  const el = document.getElementById('lsSidebar');
  if (!el || !content?.chapters) return;
  const progress = LA.Auth.getLessonProgress(cid);
  let html = '<div style="font-family:var(--ff-d);font-size:1.05rem;font-weight:700;margin-bottom:12px">Contenu du cours</div><div class="ls-list">';
  content.chapters.forEach((ch, ci) => {
    html += `<div class="ls-ch">Ch.${ci+1} — ${ch.title}</div>`;
    (ch.lessons || []).forEach((l, li) => {
      const active = ci === curCh && li === curLes;
      const lesKey = ci + '_' + li;
      const done = progress.includes(lesKey) || progress.includes(l.id);
      html += `<div class="ls-item ${active?'active':''} ${done&&!active?'done':''}" onclick="window.location.href='lesson.html?course=${cid}&chapter=${ci}&lesson=${li}'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          ${done?'<polyline points="20 6 9 17 4 12"/>'
            :active?'<polygon points="5 3 19 12 5 21 5 3"/>'
            :'<circle cx="12" cy="12" r="10"/>'}
        </svg>
        <span style="flex:1;font-size:.79rem">${l.title}</span>
      </div>`;
    });
  });
  html += '</div>';
  el.innerHTML = html;
}

function updateProgress(cid, content) {
  const total = getAllLessons(content).length;
  const done = LA.Auth.getLessonProgress(cid).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById('progFill');
  const txt = document.getElementById('progTxt');
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = pct + '% complété';
}

async function renderLesson() {
  const p = new URLSearchParams(window.location.search);
  const cid = p.get('course');
  const chIdx = parseInt(p.get('chapter') || '0', 10);
  const lIdx = parseInt(p.get('lesson') || '0', 10);

  if (!cid) { window.location.href = 'courses.html'; return; }
  if (!LA.Auth.isLoggedIn()) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href); return; }

  try {
    // Get course data (cached)
    if (!courseData || courseData.id !== cid) {
      const res = await LA.Courses.get(cid);
      if (!res.ok) { window.location.href = 'course-detail.html?id=' + cid; return; }
      courseData = res.data.course;
    }

    if (!courseData.enrolled) { window.location.href = 'course-detail.html?id=' + cid; return; }

    const content = courseData.content;
    if (!content?.chapters?.[chIdx]?.lessons?.[lIdx]) {
      window.location.href = 'course-detail.html?id=' + cid; return;
    }

    const ch = content.chapters[chIdx];
    const lesson = ch.lessons[lIdx];

    // Set global context for AI
    currentCourseId = cid;
    currentLessonId = lesson.id || (chIdx + '_' + lIdx);
    currentLessonTitle = lesson.title;
    window._aiCtx = { courseId: cid, lessonId: lesson.id };

    document.title = lesson.title + ' — Luckily Academy';
    document.getElementById('topTitle').textContent = courseData.title;

    // Nav (all lessons)
    const all = getAllLessons(content);
    const cur = all.findIndex(x => x.ch === chIdx && x.les === lIdx);

    // Build lesson HTML
    const lessonKey = chIdx + '_' + lIdx;
    const progress = LA.Auth.getLessonProgress(cid);
    const isDone = progress.includes(lessonKey) || progress.includes(lesson.id);

    const wrap = document.getElementById('lessonWrap');
    wrap.innerHTML = `
      <!-- MAIN CONTENT -->
      <div>
        <!-- Breadcrumb -->
        <div class="breadcrumb" style="margin-bottom:20px">
          <a href="courses.html">Formations</a>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          <a href="course-detail.html?id=${cid}">${courseData.title}</a>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          <span>${lesson.title}</span>
        </div>

        <!-- Image -->
        ${lesson.image ? `<img src="${lesson.image}" alt="${lesson.title}" style="width:100%;border-radius:var(--r-lg);margin-bottom:24px;max-height:380px;object-fit:cover" onerror="this.style.display='none'" loading="lazy"/>` : ''}

        <!-- Content -->
        <div class="lesson-content" id="lessonContent">
          <h1>${lesson.title}</h1>
          <div id="lessonBody">${mdToHTML(lesson.content || '')}</div>
        </div>

        <!-- Mark complete + Nav -->
        <div style="border-top:1px solid var(--border);padding-top:28px;margin-top:36px">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
            <button id="markBtn" class="mark-btn" style="${isDone?'background:linear-gradient(135deg,#06D6A0,#0096B5)':''}" onclick="markLesson('${cid}','${lessonKey}','${lesson.id||''}')">
              ${isDone ? '✓ Leçon complétée' : 'Marquer comme complétée'}
            </button>
            <span style="font-size:.78rem;color:var(--text-m)">Progressez à votre rythme</span>
          </div>
          <div class="lesson-nav-btns">
            <button class="btn-nav-lesson btn-prev-l" id="prevBtn" ${cur <= 0 ? 'style="opacity:.4" disabled' : ''} onclick="goLesson('${cid}',${cur > 0 ? all[cur-1].ch : 0},${cur > 0 ? all[cur-1].les : 0},'${lessonKey}','${lesson.id||''}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
              Leçon précédente
            </button>
            <button class="btn-nav-lesson btn-next-l" id="nextBtn" onclick="${cur < all.length-1 ? `goLesson('${cid}',${all[cur+1].ch},${all[cur+1].les},'${lessonKey}','${lesson.id||''}')` : `finishCourse('${cid}','${lessonKey}','${lesson.id||''}')`}">
              ${cur < all.length-1 ? 'Leçon suivante' : 'Terminer la formation'}
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>

        <!-- AI Help -->
        <div style="margin-top:36px;background:var(--bg-alt);border-radius:20px;padding:22px;border:1px solid var(--border)">
          <h3 style="font-family:var(--ff-d);font-size:1.1rem;font-weight:700;margin-bottom:6px">Besoin d'aide sur cette leçon ?</h3>
          <p style="font-size:.83rem;color:var(--text-m);margin-bottom:12px">Notre IA peut expliquer les concepts, donner des exemples et tester votre compréhension.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="ai-q-btn" onclick="aiQuick('explain')">Expliquer en détail</button>
            <button class="ai-q-btn" onclick="aiQuick('example')">Exemple pratique</button>
            <button class="ai-q-btn" onclick="aiQuick('quiz')">Quiz rapide</button>
            <button class="ai-q-btn" onclick="aiQuick('summary')">5 points clés</button>
          </div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="ls-panel" id="lsSidebar">
        <div style="text-align:center;padding:20px;color:var(--text-m)">Chargement...</div>
      </div>`;

    updateProgress(cid, content);
    renderSidebar(content, cid, chIdx, lIdx);

  } catch(e) {
    console.error('Lesson render error:', e);
    document.getElementById('lessonWrap').innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:var(--text-m)">
        <p style="margin-bottom:16px">Erreur de chargement de la leçon.</p>
        <button onclick="renderLesson()" class="btn-primary" style="display:inline-flex">Réessayer</button>
      </div>
      <div></div>`;
  }
}

async function markLesson(cid, lessonKey, lessonId) {
  const btn = document.getElementById('markBtn');
  if (btn) {
    btn.textContent = '✓ Leçon complétée';
    btn.style.background = 'linear-gradient(135deg,#06D6A0,#0096B5)';
  }
  // Mark both key formats
  await LA.Auth.markLessonDone(cid, lessonKey);
  if (lessonId && lessonId !== lessonKey) await LA.Auth.markLessonDone(cid, lessonId);
  // Update sidebar and progress bar
  const p = new URLSearchParams(window.location.search);
  const chIdx = parseInt(p.get('chapter')||'0',10);
  const lIdx = parseInt(p.get('lesson')||'0',10);
  if (courseData?.content) {
    renderSidebar(courseData.content, cid, chIdx, lIdx);
    updateProgress(cid, courseData.content);
  }
  LA.toast('Leçon complétée !', 'success');
}

function goLesson(cid, ch, les, markKey, markId) {
  // Auto-mark current lesson
  LA.Auth.markLessonDone(cid, markKey);
  if (markId && markId !== markKey) LA.Auth.markLessonDone(cid, markId);
  window.location.href = `lesson.html?course=${cid}&chapter=${ch}&lesson=${les}`;
}

function finishCourse(cid, markKey, markId) {
  LA.Auth.markLessonDone(cid, markKey);
  if (markId && markId !== markKey) LA.Auth.markLessonDone(cid, markId);
  LA.toast('Félicitations ! Formation terminée !', 'success');
  setTimeout(() => { window.location.href = 'course-detail.html?id=' + cid; }, 1500);
}

renderLesson();
</script>
